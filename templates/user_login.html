{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>
    <div class="container mt-5">
        <div class="login-box p-4 bg-white rounded shadow">

            <form method="POST">
                {% csrf_token %}
                <h1 class="text-center">Login Page</h1>

                <div class="mb-3">
                    <label for="email" class="form-label">Enter the email id:</label>
                    <input id="email" type="email" class="form-control" name="email" autofocus required>
                </div>
                <div class="mb-3">
                    <label for="person" class="form-label">Select the person:</label>
                    <select id="person" class="form-control" name="person" required>
                        <option>select</option>
                        <option value="Donor" id="Donor">Donor</option>
                        <option value="Patient" id="Patient">Patient</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Enter the Password:</label>
                    <input id="password" type="password" class="form-control" name="password" required>
                </div>

                <a href="#" class="d-block mb-3">Forgotten Password</a>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>

        </div>
    </div>
      {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
