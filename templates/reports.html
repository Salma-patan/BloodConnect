{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Admin Reports</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          href="{% static 'css/donor_page.css' %}">
    <!-- CSS -->
    <link rel="stylesheet"
          href="{% static 'css/reports.css' %}">

    <!-- Chart JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="logo text-center mb-4">

            <img src="{% static 'images/bloodlogo1.png' %}"
                 width="70"
                 height="70">

            <h4 class="mt-2">
                Blood Connect
            </h4>

        </div>

        <a href="{% url 'adminpage' %}">
            Dashboard
        </a>

        <a href="{% url 'donor_details' %}">
            Donor Details
        </a>

        <a href="{% url 'patient_details' %}">
            Patient Details
        </a>
        <a href="{% url 'blood_banks' %}">
            Blood Banks
        </a>

        <a href="{% url 'admin_requests' %}">
            Blood Donations
        </a>

        <a href="{% url 'admin_reports' %}">
            Reports
        </a>

        <a href="{% url 'user_logout' %}">
            Logout
        </a>

    </div>


    <!-- MAIN CONTENT -->
    <div class="main-content">

        <h2 class="mb-4">
            Blood Donation Reports
        </h2>

        <div class="row">

            <!-- BAR CHART -->
            <div class="col-md-6 mb-4">

                <div class="chart-box">

                    <h4 class="chart-title">
                        Overall Report
                    </h4>

                    <canvas id="barChart"></canvas>

                </div>

            </div>

            <!-- PIE CHART -->
            <div class="col-md-6 mb-4">

                <div class="chart-box">

                    <h4 class="chart-title">
                        Request Status
                    </h4>

                    <canvas id="pieChart"></canvas>

                </div>

            </div>

        </div>

    </div>

</div>


<script>

    // Values from Django

    const total_donors = Number("{{ total_donors }}");
    const total_patients = Number("{{ total_patients }}");
    const approved = Number("{{ approved }}");
    const pending = Number("{{ pending }}");
    const rejected = Number("{{ rejected }}");


    // BAR CHART

    const barctx = document.getElementById('barChart');

    new Chart(barctx, {

        type: 'bar',

        data: {

            labels: [
                'Donors',
                'Patients',
                'Approved',
                'Pending',
                'Rejected'
            ],

            datasets: [{

                label: 'Blood Donation Report',

                data: [
                    total_donors,
                    total_patients,
                    approved,
                    pending,
                    rejected
                ],

                backgroundColor: [
                    '#dc3545',
                    '#198754',
                    '#0d6efd',
                    '#ffc107',
                    '#6c757d'
                ],

                borderRadius: 10,
                borderWidth: 1

            }]

        },

        options: {

            responsive: true,

            maintainAspectRatio: false,

            scales: {

                y: {

                    beginAtZero: true

                }

            }

        }

    });



    // PIE CHART

    const piectx = document.getElementById('pieChart');

    new Chart(piectx, {

        type: 'pie',

        data: {

            labels: [
                'Approved',
                'Pending',
                'Rejected'
            ],

            datasets: [{

                data: [
                    approved,
                    pending,
                    rejected
                ],

                backgroundColor: [
                    '#198754',
                    '#ffc107',
                    '#dc3545'
                ]

            }]

        },

        options: {

            responsive: true,

            maintainAspectRatio: false

        }

    });

</script>

</body>
</html>
