{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/donate_blood.css' %}">

    <title>Donate Blood</title>

</head>

<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="sidebar">

        <!-- Logo -->
        <div class="logo text-center mb-4">

            <img src="{% static 'images/bloodlogo1.png' %}"
                 alt="Blood Connect Logo"
                 width="70"
                 height="70">

            <h4>Blood Connect</h4>

        </div>

        <!-- Sidebar Links -->
        <a href="{% url 'donorpage' %}">Home</a>
        <a href="{% url 'donor_requests' %}">Requests</a>
        <a href="{% url 'donations'}">My Donations</a>
        <a href="{% url 'donor_notification' %}">Notification</a>
        <a href="{% url 'rewars' %}">Rewards</a>
        <a href="{% url 'donor_profile' %}">Profile</a>
        <a href="{% url 'user_logout' %}">Logout</a>

        <!-- Sidebar Footer -->
        <div class="sidebar-footer text-center mt-4">

            <img src="{% static 'images/navside.png' %}"
                 alt="Navigation Logo"
                 width="180"
                 height="100"
                 class="img-fluid">

            <h5 class="mt-3">
                Thank You!
            </h5>

            <p>
                You are a hero for saving lives
            </p>

        </div>

    </div>

    <!-- Main Content -->
    <div class="container-fluid p-4">
        <div class="mt-4 text-center">
            <h2 class="mb-3">Donate Blood</h2>
        </div>

        <div class="mt-4 text-center">

            <img src="{% static 'images/request_blood.jpg' %}"
                 class="img-fluid rounded"
                 width="1100"
                 alt="Request Blood">

        </div>

    </div>
    <div class=""

</div>

</body>
</html>
