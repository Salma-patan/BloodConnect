{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <title>Edit Donor Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/donor_page.css' %}">
    <link rel="stylesheet" href="{% static 'css/donor_profile.css' %}">

</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="logo text-center mb-4">
            <img src="{% static 'images/bloodlogo1.png' %}" width="70" height="70">
            <h4 class="mt-2">Blood Connect</h4>
        </div>

        <a href="{% url 'donorpage' %}">Home</a>
        <a href="{% url 'camps' %}">Find Camps</a>
        <a href="{% url 'donor_requests' %}">Requests</a>
        <a href="{% url 'donations' %}">My Donations</a>
        <a href="{% url 'donor_notification' %}">Notification</a>
        <a href="{% url 'rewards' %}">Rewards</a>
        <a href="{% url 'donor_profile' %}">Profile</a>
        <a href="{% url 'user_logout' %}">Logout</a>

    </div>

    <!-- MAIN CONTENT -->
    <div class="flex-grow-1">

        <div class="main-content">

            <div class="profile-card">

                <h2>Edit Donor Profile</h2>

                <form method="POST">
                    {% csrf_token %}

                    <div class="details">

                        <div class="row">
                            <div class="label">First Name</div>
                            <input type="text" name="first_name" class="form-control"
                                   value="{{ donor.first_name }}">
                        </div>

                        <div class="row">
                            <div class="label">Last Name</div>
                            <input type="text" name="last_name" class="form-control"
                                   value="{{ donor.last_name }}">
                        </div>

                        <div class="row">
                            <div class="label">Email</div>
                            <input type="email" class="form-control"
                                   value="{{ donor.email }}" readonly>
                        </div>

                        <div class="row">
                            <div class="label">Phone</div>
                            <input type="text" name="phone" class="form-control"
                                   value="{{ donor.phone }}">
                        </div>

                        <div class="row">
                            <div class="label">Gender</div>
                            <input type="text" name="gender" class="form-control"
                                   value="{{ donor.gender }}">
                        </div>

                        <div class="row">
                            <div class="label">Country</div>
                            <input type="text" name="country" class="form-control"
                                   value="{{ donor.country }}">
                        </div>

                        <div class="row">
                            <div class="label">State</div>
                            <input type="text" name="state" class="form-control"
                                   value="{{ donor.state }}">
                        </div>

                        <div class="row">
                            <div class="label">District</div>
                            <input type="text" name="district" class="form-control"
                                   value="{{ donor.district }}">
                        </div>

                        <div class="row">
                            <div class="label">City/Town</div>
                            <input type="text" name="city_town" class="form-control"
                                   value="{{ donor.city_town }}">
                        </div>

                        <div class="row">
                            <div class="label">Pincode</div>
                            <input type="text" name="pincode" class="form-control"
                                   value="{{ donor.pincode }}">
                        </div>

                        <div class="row">
                            <div class="label">Blood Group</div>
                            <input type="text" name="bloodgroup" class="form-control"
                                   value="{{ donor.bloodgroup }}">
                        </div>

                        <div class="row">
                            <div class="label">Date of Birth</div>
                            <input type="date" name="dob" class="form-control"
                                   value="{{ donor.dob }}">
                        </div>

                        <!-- SAVE BUTTON -->
                        <div class="text-center mt-4">

                            <button type="submit" class="btn btn-danger">
                                Save Changes
                            </button>

                        </div>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
