{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <title>Update Camp</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="card p-4 shadow">

        <h2 class="text-center mb-4">
            Update Blood Camp
        </h2>

        <form method="POST">

            {% csrf_token %}

            <!-- Camp Name -->
            <div class="mb-3">

                <label class="form-label">
                    Camp Name
                </label>

                <input type="text"
                       name="camp_name"
                       class="form-control"
                       value="{{ camp.camp_name }}"
                       required>

            </div>

            <!-- Location -->
            <div class="mb-3">

                <label class="form-label">
                    Location
                </label>

                <input type="text"
                       name="location"
                       class="form-control"
                       value="{{ camp.location }}"
                       required>

            </div>

            <!-- Date -->
            <div class="mb-3">

                <label class="form-label">
                    Date
                </label>

                <input type="date"
                       name="date"
                       class="form-control"
                       value="{{ camp.date|date:'Y-m-d' }}"
                       required>

            </div>

            <!-- Contact -->
            <div class="mb-3">

                <label class="form-label">
                    Contact
                </label>

                <input type="text"
                       name="contact"
                       class="form-control"
                       value="{{ camp.contact }}"
                       required>

            </div>

            <!-- Buttons -->
            <div class="text-center">

                <button type="submit"
                        class="btn btn-danger">

                    Update Camp

                </button>

                <a href="{% url 'blood_camps' %}"
                   class="btn btn-secondary">

                    Cancel

                </a>

            </div>

        </form>

    </div>

</div>

</body>

</html>
