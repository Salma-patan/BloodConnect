<!DOCTYPE html>
<html lang="en">

<head>
    <title>Delete Camp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="card p-4 shadow-sm text-center">

        <h3 class="text-danger mb-3">Are you sure you want to delete this camp?</h3>

        <p><b>Location:</b> {{ camp.location }}</p>
        <p><b>Date:</b> {{ camp.date }}</p>
        <p><b>Contact:</b> {{ camp.contact }}</p>

        <form method="POST">
            {% csrf_token %}

            <a href="{% url 'camp_admin' %}" class="btn btn-secondary">
                Cancel
            </a>

            <button type="submit" class="btn btn-danger">
                Yes, Delete
            </button>
        </form>

    </div>

</div>

</body>
</html>
